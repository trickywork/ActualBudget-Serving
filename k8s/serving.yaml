apiVersion: v1
kind: Namespace
metadata:
  name: smartcat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcat-serving
  namespace: smartcat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartcat-serving
  template:
    metadata:
      labels:
        app: smartcat-serving
    spec:
      containers:
        - name: serve
          image: actualbudget-serving:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.launch"]
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_KIND
              value: "onnx_dynamic_quant"
            - name: MODEL_PATH
              value: "/workspace/models/optimized/v2_tfidf_linearsvc_model.dynamic_quant.onnx"
            - name: SOURCE_MODEL_PATH
              value: "/workspace/models/source/v2_tfidf_linearsvc_model.joblib"
            - name: MODEL_VERSION
              value: "v2_tfidf_linearsvc"
            - name: CODE_VERSION
              value: "k8s"
            - name: SERVICE_HOST
              value: "0.0.0.0"
            - name: SERVICE_PORT
              value: "8000"
            - name: WEB_CONCURRENCY
              value: "2"
            - name: RUNTIME_DIR
              value: "/workspace/runtime"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smartcat-serving
  namespace: smartcat
spec:
  type: NodePort
  selector:
    app: smartcat-serving
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
